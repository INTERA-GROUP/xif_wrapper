      - job: COCOTB
        displayName: "COCOTB"
        container: ubuntu_ci_container
        steps:
          - task: InstallSSHKey@0
            inputs:
              sshKeySecureFile: 'azure_pipeline_rsa'
              knownHostsEntry: 'ssh.dev.azure.com ssh-rsa '
              
          - script: |
              git submodule update --init --recursive
              make setup_common_files
              make regression REGRESSION_NAME=regress_cocotb -j
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'result'
              ArtifactName: 'verilator_logs'
              publishLocation: 'Container'
            condition: always()
            

